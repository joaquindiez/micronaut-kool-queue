micronaut:
  application:
    name: kool-queue-app-test
  scheduler:
    kool-queue:
      max-concurrent-tasks: 4
      shutdown-timeout-seconds: 30
      enable-management-endpoints: true
      # Must stay comfortably above the slowest task's heartbeat gap (the
      # reaper itself beats once per 30s), or live workers get self-reaped.
      dead-worker-threshold-seconds: 60
      # Retry/backoff (small values here keep the manual retry test fast)
      max-attempts: 5
      retry-backoff-base-seconds: 1
      retry-backoff-max-seconds: 10
      schema: kool_queue
      queues:
        - emails
        - reports
        # "vip" intentionally NOT included — jobs sent there should sit unprocessed

endpoints:
  all:
    enabled: true
    sensitive: false
  health:
    enabled: true
  kool-queue-scheduler:
    enabled: true

datasources:
  default:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: 'changeme'
    driver-class-name: org.postgresql.Driver
    db-type: postgres
    dialect: POSTGRES
jpa:
  default:
    entity-scan:
      packages:
        - com.freesoullabs.domain
    properties:
      hibernate:
        hbm2ddl:
          auto: update

  logger:
    levels:
      com.joaquindiez.koolQueue: DEBUG
      io.micronaut.context: WARN

